services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: invoice_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  mock-psp:
    build:
      context: .
      dockerfile: Dockerfile.mock-psp
    ports:
      - "9090:9090"
    environment:
      RUST_LOG: mock_psp=info

  invoice-service:
    build:
      context: .
      dockerfile: Dockerfile.invoice-service
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/invoice_service
      PSP_BASE_URL: http://mock-psp:9090
      PORT: "8080"
      RUST_LOG: invoice_service=debug,tower_http=debug
    depends_on:
      postgres:
        condition: service_healthy
      mock-psp:
        condition: service_started

volumes:
  pgdata:
